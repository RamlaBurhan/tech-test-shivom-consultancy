groups:
  - name: application-alerts
    rules:
      - alert: HighErrorRate
        expr: |
          sum by (service) (rate(http_requests_total{status_code=~"5.."}[5m]))
            /
          sum by (service) (rate(http_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: High 5xx error rate on {{ $labels.service }}
          description: More than 5% of requests are returning 5xx over the last 5 minutes.

      - alert: HighRequestLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High p95 request latency
          description: p95 latency is above 1s for 5 minutes.

      - alert: AppInstanceDown
        expr: up{job="sample-web-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Application instance is down
          description: Prometheus cannot scrape the sample-web-app target.

  - name: host-alerts
    rules:
      - alert: HighCpuUsage
        expr: |
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High CPU usage on {{ $labels.instance }}
          description: CPU usage has been above 80% for 5 minutes.

      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High memory usage on {{ $labels.instance }}
          description: Memory usage has been above 85% for 5 minutes.

      - alert: LowDiskSpace
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Low disk space on {{ $labels.instance }}
          description: Disk usage is above 85% on {{ $labels.mountpoint }}.
          
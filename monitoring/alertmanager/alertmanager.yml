global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = critical
      receiver: default
      repeat_interval: 1h

receivers:
  - name: default
    #  webhook sink for local testing.
    webhook_configs:
      - url: http://host.docker.internal:5001/webhook
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['service']
